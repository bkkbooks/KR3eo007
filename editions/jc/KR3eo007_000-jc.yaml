body:
  text: 性命篇上大道起手在乎性命兩者合一得其把柄東亭曰學問之大莫大於性命性命之學不明於世也久矣故今將性命之玄旨遂以發明之蓋人父母未生之前本來性命合一到十月胎圓氣足形動胞裂猶如高山失足㘞地一聲而性命到此則分為一矣自此性不能見命命不能見性少而壯壯而老老而嗚呼是以上古至人大發仁慈教後世學者再入胞胎重造我之性命將我之神氣入於竅內合而為一古人謂之性命雙修而性命雙修斯為仙道男女交合斯為凡道凡道仙道其道一也凡道以女嫁男仙道以男嫁女凡道汞去投鉛仙道鉛來投汞凡道未濟仙道既濟凡道是順仙道是逆順行有生有死逆修萬劫常存凡道婦人懷孕後有一物如豆子大覺在臍下跳動醫書謂之胎原胎原者人身從此發源也由是而五臟六腑由是而四肢百骸由是而能視能聽能持能行由是而能仁能義能禮能智由是而能聖能神能文能武若達此理乃凡父凡母交凝成一胎原也仙道自結丹頭後亦有一物如豆子大覺在臍下跳動惟斯命寶上天所秘聖賢仙佛留下丹經子書僉不肯明言直論巧喻設象萬號千名無非此物無非此竅也如不諳此竅而欲修道真是涉水捕雞兔登山索魚龍矣三豐祖師云修煉不知玄關如入暗室一般苟或不知玄關但從何處採取從何處烹煉真種從何處覓藥物從何處產爐鼎從何處立周天從何處運陽火從何處進陰符從何處退卯酉從何處沐浴小周天始終功夫靡不在玄關用事若達此理乃聖父靈母交凝成一玄關也紫陽真人云此竅非凡竅乾坤共合成是也凡道無胎原不能生男生女仙道無玄關又豈能成佛作祖乎學者先明玄關之理待後行功心有主宰也得此法者至簡至易不得此法者愈繁愈難自知一天必有一地一日必有一月一男必有一女一龍必有一虎一龜必有一蛇一雄必有一雌一陰必有一陽易曰一陰一陽之謂道呂翁云玄篇種種說陰陽二字名為萬法王三豐祖云女子無夫為怨女男子無妻是曠夫天下萬事萬物莫不有對若能知二八同類三五合一自然語一悟百豁然貫通再加平時熟讀丹經仔細參悟則無弗明矣後信心愈堅而功行愈篤如撥開雲霧而得見天日也抱朴子曰世或有好道者不見此法不遇真師無由聞天下之有斯妙事也少年下手立見效驗若不能頃刻見效便是偽師哄弄愚夫烏足信乎然道有三秘一曰採取二曰藥物三曰火候三者之外更有玄關三豐所謂不識玄關端的處真鉛採來何處安只知玄關而不知採取紫陽所謂鉛遇癸生須急採金逢望遠不堪嘗只知採取而不知藥物紫陽所謂鼎內若無真種子猶將水火煮空鐺只知採取藥物玄關而不知火候者上陽子所謂外火雖動而行內符閉息不應枉費神功以至逐節功夫文武火候亦如算法九九八十一歸除也其中細微教人見子打子也於是調息之法人能知進氣者其心愈細而氣愈微只消數十息多則百餘息自然氣伏於下元則其息長而遠矣出於三焦之上則其息短而促矣所以靈龜千歲者善調息之故也常將日光下照海水自然上潮潮信至則先天氣生入藥鏡云先天氣後天氣得之者常似醉是也夫天氣下降地氣上升而萬物始生男精和於女血而胎原始成丹道亦然旌陽祖云與君說破我家風太陽移在月明中又云日精若與月華合自有真鉛出世來柯懷經云日裡金烏飛入廣寒此所謂心中之陰氣去和腎中之陽氣陰氣得此陽氣則有安身立命之所也朝元子云南邊血是砂中汞北畔精為水內鉛柯懷經云風吹楊柳鉛情現雨灑桃花汞性開馬自然云鉛汞鼎中居燒成無價珠都來兩個字了盡萬家書鍾離翁曰除卻鉛汞兩味藥其他都是誑愚迷欲修先天大道妙在一陽下手冬至乃一歲一陽月出庚乃一月一陽子時乃一晝夜一陽學者須明白我身中一陽身中一陽即外腎舉也無念而舉斯為清有念而舉斯為濁豈不究哉柯懷經云一陽初動自心知正是丹家下手時華陽祖云陽生之時即起手之時能於此時下手又何疑惑乎鉛返之際運一點汞以迎之此章凝神入氣之時也逐日行工須藉巽風吹噓則鉛盡化為氣矣棲云先生云人吃五穀化為陰精不曾煆煉此物在裡面作怪只用丹田自然呼吸之氣吹動其中真火水在上火在下水得火自然化而為氣其氣上騰熏蒸傳透一身之關竅流通百脈燒得里頭神嚎鬼哭將陰精煉盡陰魔消散矣又覓元子云陰精者五穀飲食之精苟非巽風坤火猛烹極煉此精必在身中思想淫欲攪亂心君務要凝神調息使橐籥鼓風而風吹火烹煉陰精化而為氣其武火能採取又能煉鉛文火能溫養又能益汞古人謂之文烹武煉是也所謂巽風者後天呼吸之氣乃母氣也先天真一之氣乃子氣也以母氣伏子氣如貓捕鼠見賊即擒則用風之法得也子時用武火他時用文火用橐籥為武火不用橐籥為文火然火候未得師授終難自知天道無一息不運丹道無一息不行必要行到無息方成一個大丹而先天之氣來自虛無真正迅速若起大明覺則入於後天非先天清真之氣也倘稍遲即轉經化為濁精而泄亦無所用矣悟真篇云見之不可用用之不可見恍惚里相逢杳冥中有變古人比喻親切今人心內糊塗反謂丹經不曾直說良可嘆也每當活子時外形勃起神入氣穴用武火猛煉少頃陽痿用文火溫養或一月之間或百日之期則我身內之玄關自然透露矣天秩老師云人能知鉛汞二物合成一物則玄關始立矣柯懷經云玄關本無待神氣交而後有上陽子云兩者相形一物生焉五化篇云陰陽相搏芝菌無根而生也燥濕相育蝤蠐不母而產也以上言立玄關之法也老子云恍恍惚惚其中有物杳杳冥冥其中有精莊子云北溟有魚其名為鯤魏伯陽云知白守黑神明自來丹經云真鉛真汞人不識露出一鉤清淨月此章言玄關初立則五陰之下一陽始生也三豐祖云玄關往來無定位又云黃庭一路皆玄關此二句蓋言玄關透露已久活活潑潑曾無定向純陽祖云玄牝玄牝真玄牝不在心兮不在腎窮取生身受氣初莫怪天機都泄盡悟真篇云勸君窮取生身處返本還原是藥王此二段言透露玄關之所則男子之氣穴與婦人之子宮是也而氣穴子宮其地一也其位同也間有不同者只是中間顛倒顛耳如何是中間程子曰不偏不倚是也知此道者則曰君子中庸不知此道者則曰小人反中庸如何是顛倒易曰地天泰是也既知顛倒顛則可以盜天地之機而成造化程伊川云若非竊造化之機安能長生乎陰符經云其盜機也能知盜機者而命由我不由天矣且夫六合內一虛竅者則上天下地交媾於虛竅之中東日西月運行於虛竅之外而萬物得以生生無窮實因天地之交感日月之運行也雖天地交感日月運行若無土為根基而萬物何以發生乎然五行無土則不全五金無土則不生五穀無土則不實金丹無土則不成金丹之始終全賴真土以成功蓋土者意也卻非後天之意乃先天之真意也尹真人云真意者乾元也乃天地之母陰陽之根水火之本日月之源三才之宗五行之祖萬物賴之以生成千靈承之以舒慘總之莫能自悟者真土也或問曰終在玄關處交媾何也東亭答曰不在玄關處交媾根基何所立焉金碧古文云上弦金八兩下弦水半斤兩弦媾其精乾坤體乃成即此義也天秩老師云修煉功勤者效驗極速只消三兩月多則百餘日玄竅補足其物上至心宮下至腎府縱橫順逆莫可遮攔莊子云化而為鳥其名為鵬丹經所謂菩提子又謂舍利子又謂黍米玄珠又謂人參果異名極多無非喻我身中之種子也無非喻我身中之玄關也無非喻我身中之太極也學者煆煉至此切勿犯淫如有犯淫等事大則必死小則必瘋可不戒之性命篇下藥物火候大小周天依法煆煉九轉成仙東亭曰煉到玄竅充溢爐內自有藥物發生則謂之真一之氣又為先天真鉛張三丰云只在家中取何勞向外尋悟真篇云此般至寶家家有自是愚人識不全陸子野云家家有個家家有幾個能知幾個還白玉蟾云原來家裡有真金修真詩云隨時藥料家中取又云認取家園真種子好收海底白蓮花以上所云家中家家家裡家園即自家之謂切勿聽偽師之謬解也夫藥物欲生俄頃癢生毫竅肢體如綿心覺恍惚壺中藥氣外馳玉莖挺硬丹經所謂藥產之子時也華陽祖云此乃藥產之法象不可驚怪一起驚疑之念則神馳氣散矣務須思慮頓息以虛待之不可妄起刻漏之武火亦不可迷失真候靜聽氣之動旺沖虛子云覺而不覺復覺真元覺而不覺者陽氣未旺不宜急進武火復覺真元者陽氣已旺斯時速當下手採取矣採取藥物怎知不老不嫩耶即張三丰云月之圓存乎口訣時之子妙在心傳白玉蟾云月圓口訣明明語時子心傳果不訛是也而藥物採入爐乃一候武火封固停息乃一候文火達摩祖云二候採牟尼者即此也張三丰云只於二候金丹就亦即此也又云尚餘四候有神功乃小周天升降沐浴之四候也寂無禪師謂採取從督脈上升泥丸烹煉從任脈降下丹田為一周天許旌陽謂乾用九積得陽爻二百十六乃抽鉛度數坤用六積得陰爻一百四十四乃添汞限規為一周天柳華陽謂十二規為一周天伍沖虛謂子進陽火三十六歇火於卯謂之沐浴午退陰符二十四停符於酉謂之沐浴為一周天陳泥丸謂天上十二辰行至卯位則刑殺運至酉地則德生為一周天參同契謂十二個月逢春分而榆葉落遇秋分而麥芽生為一周天其小周天功法甚多姑不具論有行幾十周天而滿足有行百餘周天而滿足甚有行數百周天而滿足者亦有之總之凡一動即一煉煉而復煉周而復周又云積之不過百日則精不漏而返氣矣張三丰云照此進功築基可翹足而至不必百日也柳華陽云百日是煉精之名若少年功勤者得丹速則百日可期若中年年邁之人未可定期恐有外陽不生者務要煉到外陽生而外陽生者又要煉到外陽不生而外陽不生何也茲因鉛氣飛盡煉就一塊乾水銀方得龜縮不舉佛經云成就如來馬陰藏相黃庭經云閉子精路可長活李虛庵云陽關一閉個個長生圭旨云逐日如此交媾如此抽添汞漸多鉛漸少久則鉛將盡汞亦干結成一顆摩尼是為金液大還丹也悟真篇云用鉛不得用凡鉛用了真鉛也棄捐此是用鉛真妙訣用鉛不用是誠言朝元子云汞干鉛自捐紫賢真人云學者問道至此則知師恩難報當盟心於天日之下誓當成道以答師恩若負師恩如負天日也子野真人云用鉛之法如捕魚兔之筌蹄魚兔賴筌蹄而得之既得魚兔則筌蹄無用矣張紫陽云始於有作人難見及至無為眾始知但信無為為要妙豈知有作是根基有作若交媾也築基也命功也命者也調藥採藥煉藥以補其虧損則固其命蒂也無為者煉已也性功也性也者去三心滅四相絕六慾斷七情一切俗慮俱忘則養其性根也白玉蟾云性之根命之蒂同出異名分兩類合歸一處結成丹還為元始先天氣誠哉是言也煉丹到陽純陰盡之際自有陽光發現於眉端已到陽光三現速當止火倘不知止足必傾危矣紫陽真人云若也持盈未已心不免一朝遭殆辱所云止火止其後天武火遂用天然文火悟真篇云自有天然真火候不須柴炭及吹噓於是真氣盡凝於鼎中必匿而不出前文言小藥先生而後採此卻言大藥先採而後生須用七日採工其採法以雙眸之光返視於鼎中以兩耳之聰返聽於鼎中以心中之靈註定於鼎中一晝夜或兩三次或四五次余時渾渾淪淪如此行持到七日之間懸胎鼎中則大藥始萌矣黃庭經云晝夜七日思勿眠易云七日來復又云復其見天地之心乎丹經云天女獻花龍女獻珠即此也前小周天以元氣為小藥此大周天以元神為大藥這大藥煉到如火珠之形猛然六根震動丹田火熾兩腎湯煎眼吐金光耳聞風聲腦後鷲鳴身有湧動鼻有搐氣經此效驗當採大藥出爐行大周天之功以靜而照以柔而用待動而引護持而行切防蹊路危險之患則過關之法得矣伍沖虛云五龍捧聖丹經云轉神入定是也藥當此際自然流動活潑必上衝於心心宮不能透自轉向下田前至陽關陽關已閉自轉於後而沖夫尾閭尾閭不通由尾閭而奔穀道如穀道開而未防大藥泄去前功廢矣此名下鵲橋之危險也須以真意度過則無患矣而大藥沖尾閭不透自上升夾脊而穿玉枕直貫頂門佛云一箭射透九重鐵鼓即此義也遂向前下至印堂印堂髓阻不通恐妄馳鼻下虛竅而泄泄則前功廢矣此名上鵲橋之危險也學者不可不預防也須以真意引過印堂降下十二重樓古人謂之服食又云一粒金丹吞入腹始知我命不由天而丹至於神室之中點化陰神謂之取坎填離覆成乾坤定位此大周天之功法也大藥既歸於中宮須用抱元守一之法其法如龍養珠如雞抱卵古人謂之養道胎中庸曰道也者不可須臾離也書云允執厥中是也元神寂照於中下二田相與渾融化一虛空境界使元神靜養道胎守至二三月則元氣動機甚微識性漸漸消磨真性漸漸靈覺矣守至四五月則元氣因元神寂照以絕飲食斯為胎仙矣更守至六七月昏睡全無頭目爽快守至八九月百脈住停口鼻絕無呼吸更守至十月之期元神大定已足純陽華陽曰十月道胎火一年沐浴功正謂此也於是功到此際則能生智慧自有六通之驗矣六通者漏盡通天眼通天耳通宿命通他心通神境通是也前煉精之時精不走泄則成漏盡通此後方得五通蓋天眼通能觀天上之事天耳通能聞天上之言宿命通能曉前世之因他心通能知過去未來之事惟有神境一通若以識神用事專喜言人間禍福而不能保扶心君則入於魔道矣豈不嘆哉須慧而不用則能轉識成智始得性固而胎圓也胎已滿足神以純全斯時只知有神而不知有氣則識性死而真性靈其胎不可久留恐有滯胎之患再用徙法自中下二田徙至上田尹真人云五氣俱朝於上元三華皆聚於乾頂靜養百日直至功純垂簾偶見六出紛紛遍彌六合則出神之景至矣猛然霹靂一聲元神自天門而出慎勿驚恐驚恐則金光比散矣如有奇怪之物不可著認俟金光如車輪之態即收歸於上田養至七日再出又旋收焉一出一入由近而遠切勿躐等嬰兒幼小恐迷失忘歸或有天魔來試亂我心君出入必須謹慎方可成太虛之體古人云道高一尺魔高一丈倘煉已未純之士多由此境而壞也若乳哺三載陽神老成自可達地通天入水不溺入火不焚入金石無礙歷遍此驗方行煉神還虛一著九年面壁功夫及臻形神俱妙以待丹書下詔方證天仙之果永享無疆之福古云天地壞有時仙翁壽無極柯懷經云萬物歸原只一圈是也然言雖淺陋法自仙傳後學若潛閱是書下手功勤靡不見驗如能離塵脫俗九轉丹成指日可與鍾呂並駕矣補遺篇一男女老少皆可修行精詳妙理一見自明東亭曰男女修真俱在己身用事無非初下功夫間有異焉男子煉氣在坎宮下手坎宮即臍下丹田醫書謂之內腎是也女子煉形從離位興功離位即兩乳中間古人謂之乳房是也劉悟元云太陽煉氣男子理太陰煉形女蹄筌須知煉氣是煉鉛煉形是鍊汞男子不知真汞是有陽無陰女子不知真鉛是有陰無陽所以男子修真降白虎女子修真斬赤龍末後功夫男女皆同也男子知真汞則知末後煉形一著女子知真鉛則知末後還丹一著紫陽所謂後行長也於人年老精神衰敗又無陽生意欲修道多有畏其不能也三豐祖云人老原來有藥醫訪明師問方兒豈虛語哉今不待訪問遂以此方兒告之必先擇一靜室邀三兩知己同伴行住坐臥俱隨己意毫不勉強照此進功積神生氣積氣生精積之日久飲食漸加四體輕快丹田溫暖外陽勃興從此一靜則生機發動不期然而然此欲非術理固如是似水貯久生蟲其義同也以上盡言男女老人修行之訣以下言汞生之旨靈源大道歌云休論涕涶精津氣血液達本窮源總一般此物何曾有定位隨時變化因心意在體感熱即為汗在眼感悲即為淚在腎感念即為精在鼻感風即為涕縱橫流轉運一身到頭不出於神水神水難言識者稀資生一節由真氣一切常人每到夜間睡熟亦有陽生不知採取可惜當面錯過矣圭旨云陽精日日發生世人不知翕聚散在周身變為後天之汞也可見終日所作所為無不是汞用事一到夜間汞少必昏沉睡去矣及至年老海水枯渴而無潮信此是汞不流潤精水絕矣精路閉矣眼精昏矣耳朵聾矣故曰百姓日用而不知是不知汞用盡也欲要朱汞常存須得水鉛以制之悟真篇雲鬚要制伏覓金公參同契云太陽流珠常欲去人卒得金華轉而相因又云河上奼女靈而最神將欲制之黃芽為根曰流珠曰奼女皆指真汞而言曰金華曰黃芽皆指真鉛而言丹經云命無性不立性無命不存者此也故曰煉精化氣煉氣化神神即汞而氣即鉛豈不是鉛能生汞也圭旨云人見金之產於月而不知月之光本出於日豈不是汞亦能生鉛也鉛汞相生風火交煉及煉至鉛盡汞干斯為金丹而且龜得夜明珠而能脫殼龍得闢火珠而能飛騰蛇得定風珠而能永壽狐得月華而能變人異類尚能如是豈獨人不能得丹其理明矣蓋天地為一太極各物具一太極今例以人身太極之理言之人即一太極也鉛汞即太極之陰陽也玄關即太極中之無極也若夫伏羲河圖先天對待上德可以學之上德者乃童真之體也大禹洛書後天流行下德可以學之下德者乃已破之體也上德下德煉法雖殊及其成功一也但真鉛水中金一與四孫悟空也真汞火中木二與三豬悟能也玄關真土居中生數五沙悟淨也豈不是三五合成一個唐三藏也白馬者正位居體美在其中而暢於四肢世之讀四遊者能知三藏二字則金丹之道無不成矣參同契云三五與一天地至精可以口訣難以書傳譬如渡江以船獲魚以網無船江怎渡無網魚怎獲無法道怎修饒君智過顏閔實難強猜余今直言願同志者一目瞭然補遺篇二兩者同出故有異名兩者同入一本共根東亭曰上德無為不以察求者上德是童真之體不必求師傳授有為之學只行無為之功下德為之其用不休者下德是已破之體必要求師傳授有為之學早行栽接之功蓋破體者必有虧損若無栽接基豈能築乎故云氣敗血衰宜補接道經云按年接命以作長生之客釋典云老僧會接無根樹能續無油海底燈呂祖云嗇精宜及早接命莫教遲圭旨云果然接之則長生不接則夭死矣今人不明比喻一聞栽接即信偽師置買女鼎離形交氣以為是道契云雜性不同類安肯合體居余言栽接是從自己身中後天返出先天真陰真陽兩味藥物丹書所謂九還七返金液大丹也故三豐祖云萬般渣質皆非類真陰真陽正栽接又云陰陽交鉛汞接要知是用本身鉛汞栽接切莫猜到女人身上夫鉛汞者水火也必要明白水火之根即知栽接之義矣道德經云此兩者同出而異名所以三教經書異名同出故有鉛汞之分水火之別巧喻設象萬號千名然皆不越陰陽之外總在自己身中故云愚昧小人得而行之立超聖地紫清翁云性之根命之蒂同出異名分兩類合歸一處結成丹還為元始先天氣夫元始先天者即身中水火之根白虎首經至寶也老子云有物混成先天地生寂兮寥兮獨立而不改周子云無極之真二五之精妙合而凝何謂二五二者六二居內卦中女陰也五者九五居外卦中男陽也內外男女陰陽和合化為真一之陽所謂吾善養吾浩然之氣也吞入腹中所謂刀圭一入口白日生羽翰也蓋天地間無雨不化來子易云對待者數噫乾坤交而萬物泰坎離交而一身泰雙修秘旨盡泄於斯謂非儒教可乎更進而論之顛倒聖功之水火者即易所云以男下女是以亨之義也蓋火非尋常之火其火由坎水生足以開通脈絡是為真陽水非尋常之水其水由離火生足以降伏熏蒸是為真陰崔公云水真水火真火又云鉛龍升汞虎降呂祖云乾鉛坤汞金丹祖龍鉛虎汞最通靈三豐祖云真水火配陰陽世人莫要亂思量饒爾無為空打坐不免亡身葬北邙水火尚不能知從何栽接乎所謂真水火者蓋水中之火水不能熄名曰真火火中之水火不能消名曰真水即是真陰真陽也如再不明試看前西遊紅孩兒之火四海龍王之水不能救熄後西遊火雲樓之火四海龍王之水亦不能救必要南海觀音之水方能了事夫南者離也火也海者水也火中之水乃身中之真水也紅孩兒之火與火雲樓之火乃身中之真火也觀音者觀內之音信也音信一至水火自然既濟呂祖云此中有真信信至君必驚泥丸翁云精生有時時至神知朱元育云時節一到藥物自產余見西遊記人參果樹是這一味藥物栽接女鼎無用愈無疑矣但識藥物而不知採取火候也是徒然丹書最秘是此三者非是真秘其中有分合內外實難言也試申論之分則採者採外也取者取內也火者神火也候者真息也合則採取即是火候火候即是採取故云火候不在採取之外採取即在火候之中一到臨爐自家不能作主必要黃婆登壇分合內外皆聽黃婆號令經云黃婆乃中宮主帥又云嬰兒奼女齊齊出卻被黃婆牽入室噫嬰兒能騎白虎奼女能跨青龍黃婆只要一牽這個神通何等廣大四象五行全藉土信不誣也愈知黃婆能降龍伏虎黃婆能匹配團圓不特此也不刻時中黃婆能分子午無卦爻內黃婆能定乾坤丹道始終全伏黃婆蓋黃者中之色婆者和之意來子易云主宰者理此所以須臾不可離也及至脫胎紫清翁云泥丸宮裡有黃婆又西遊記孫悟空每到交戰時起在空中自稱曰認得孫外公麼只有黃婆認得清白識得老嫩夫黃婆在人為真意尹真人云真意者乾元也自得吳師口訣即知黃婆是父母未生身以前面目三豐祖云本來面目常發現是教人認識黃婆也或問發現可以見乎曰易無思也無為也寂然不動感而遂通於此時始得見黃婆矣至於下手調藥之法分則採真陽真火戊土也取真陰真水己土也合則陰陽和水火交戊己疊而成刀圭也以藥產言之分則要明白如何是壬水是癸水壬水陽癸水陰壬水清癸水濁壬水是真鉛是外藥是自外而來故云鉛還向外求癸水是真汞是內藥是自身所有故云汞在家中取合則歸爐烹之煉之也以火言之文火者封固沐浴止火溫養是也武火者採先天之氣取真一之鉛採坎中之爻取水中之虎採黑中之白取陰中之陽是也以周天言之陰符云天地之道浸來於云流行者氣蓋氣到即子時至矣隨用文人浸浸變成武火比喻冬至復卦一陽從地底漸漸升到天頂故謂之進陽火又名乾用九九者陽也再從武火浸浸化成文火比喻夏至姤卦一陰從天頂降到地底故謂之退陰符又名坤用六六者陰也這就是復姤自茲能運用金丹誰道不成功訣曰念不起意不散含光默真息綿文武轉換調勻自然暗合天度方可謂之周天火候故參同契以六十卦消長喻之以一年節候喻之以一月盈虛喻之其中更有言不盡底者參同契已詳載之故曰神仙不作參同契火候工夫那得知此所以為萬古丹經王也總而言之通篇所論之理雖覺明白要知皆是象言幸勿自作聰明而自誤也故紫陽云本立言以明象既得象以忘言猶設象以指意悟其意則象捐眾仙垂語雖不一律然有一寓言必有一實義務要得象忘言得意忘象切不可泥象而執文也噫願我同好必要堅志將心鑽入理窟苦讀數年一遇師時真偽自分邪正自別何至當面錯過如不悟丹書不明象言朝王暮李無怪乎指鹿為馬以羊易牛不是置女鼎便是買童男不責自己糊塗反云仙佛教我咄有是理乎余心不忍特補此篇以救之也辟邪篇邪術異端門戶林立煽惑人心不可不闢東亭曰方今正道湮沒邪教蜂起見有在家修道之士誤入傍門曲徑執迷不悟者多也邇聞俺中土教門林立聊以表之有清靜門大乘門金丹門瑤池門以及姚門一指門先天門大智門老君門最上一乘門種種傍門姑不盡述無非教人吃齋誦經謂之修善果戒殺放生謂之積功德存思死後必為仙真而歸閬苑或作佛祖而歸西天以此蠱惑人心敗壞風俗皇天震怒官府知之而不容哉向有在家門祝出家僧道捏造科錄與病人禳解星辰代老人拜斗延生或替死人做齋超度亡魂或遭災厄打醮保護地方但此外道焉有斯法力實乃弄財一大術局而已且王公學士之家亦被哄弄以為前傳後教之事不曾究及未必不明其理不知其幻乎更有引誘人出家削髮改妝學習沙門規矩謂之皈依佛氏有開設禪林招搖四方僧人聚會用艾火灸頭頂打七跑香給文帖衣缽謂之受戒和尚有待老死用火焚身謂之脫化成佛有提公案參話頭冥心打坐盲修瞎煉謂之修行有搬運存想咽津納氣守靜觀鼻謂之學道有終日忙忙募化功德建修寺觀實為已身營謀有吞日精吸月華注想長生而不老有步罡履鬥書符唸咒拿妖捉怪騙人銀錢有用五金八石講爐火煉黃白拐人資本有黑夜糾集男女入立空室赤身露體比臍合氣以為傳道有用女子作鼎器採取首經紅鉛凝結丹藥只望白日而登天紛紛邪術難以悉舉概行不義之事實屬傷天害理惑世誑人饒爾逃過法網料知難逃業報到不如改務正業歸入正道何等樂哉但望天下善男信女明其弊端知其妄謬固不被斯坑陷耳周子太極圖無極而太極太極在開闢之前夫開闢之前作何形狀蓋未可知以人身之太極推之是必為太極也明矣若太極之前更有無極愈不可知孔子曰易有太極是生兩儀未嘗言無極也然則無極究何如者人之有太極也由於陰陽交感其未經交感而散於陰陽者無極也天地渾沌之時陰陽未分豈有散於陰陽而待交感之無極乎不知有後天之陰陽即有先天之陰陽開闢以後後天之陰陽交而成物之太極開闢之前先天之陰陽交而成天之太極則當先天陰陽之未交其散而無紀者即先天之無極也無極二字陸子疑之朱子信而注之特未詳言其理耳太極動而生陽動極而靜靜而生陰靜極復動一動一靜互為其根太極者何也即渾沌也例以人身之太極父生母育之時有一點靈光明而且赤與精俱下以為一身之本在天曰命在人曰性所謂不離乎氣不離乎氣者是也有主靜之功者於獨坐時自能見之東坡詩云中宵一點落黃庭蓋有見乎此也人本天地以生天地之太極當不異此其論動靜與漢張子遠異子遠云一動而生陰陽此云動而生陽靜而生陰蓋有對待之陰陽有流行之陰陽對待之陰陽由動而生譬如人生男育女非動不能也流行之陰陽或生於靜或生於動動靜遞嬗而陰陽不窮譬如四時之運冬而又春也陰陽之流行即至誠之無息周子明言之欲人從事於至誠也動而生陽其理易知靜而生陰其理難知今特詳生陰之說靜也者窈冥之謂也一元之窈冥在戌亥兩會一年之窈冥在戌亥兩月一月之窈冥在末後五日一日之窈冥在末後兩時此乃天地自然之道人能順之動而無動而陽孕陰之機靜而無靜而陰發陽之用即謂之動生陰靜生陽亦無不可蓋動靜互為其根正周子之說也分陰分陽兩儀立焉陰陽分乃陰陽自分非分太極為兩儀也故陰陽雖分太極自在若太極變而為陰陽則太極壞天地又安得長存乎以天地言之乾上坤下相隔不相通也以人身言之離為心象取中女陰也心所藏者性也坎為腎象取中男陽也腎所藏者命也昔人云凡人未生以前性命合一本為不朽之身一出胞衣而性不見命命不見性於是凡而不聖則陰陽之分譬如夫妻反目不復同居其家不敗者未之有也觀此而下文自然之功用不可少矣陽變陰合而生水火木金土五行順布四時行焉予觀太極圖陰陽而心初疑之其陽動一邊兩陽夾一陰厥象為離於易離為中女陰也而今反為陽其陰靜一邊兩陰夾一陽厥象為坎於易坎為中男陽也而今反為陰即朱子注亦謂火陽水陰夫太極圖說所以明易理也孔子云陽卦多陰陰卦多陽乃敢翻孔子繫辭之案果何說乎不知陽變陰合具有功夫非如男女媾精可不學而能也火陰水陽乃常理耳若有主靜之功者火非尋常之火其火由坎水生足以開通脈絡是為真陽水非尋常之水其水由離火生足以降伏熏蒸是為真陰推之木能生火平火以養木木植火中而質不焦金能生水煉水以成金金沉水底而形不化火能生土燥土以培火火居土下而焰不消此所以顛倒陰陽聖功之水火者也不然陰本靜也何以靜而無靜陽本動也何以動而無動乎至言五行而曰順布蓋舉時序言之在天為自然之元貞在人為自然之終始非有功夫而有功夫又在下文矣五行一陰陽也陰陽一太極也太極本無極也此二句復說上文而顛倒出之初看甚無大意不知是由博返約功夫孔子所謂一貫者也天下萬事萬物莫非五行悉數之不能終也斂事物而歸五行初由格致之精繼由變通之妙然使五行各居其所而畛域終分相生無以資不足相剋無以制有餘天地之間生機必息故必融五行為陰陽而分者漸歸於合然易云一陰一陽之謂道乃指人道而言若盡人合天則太極是道陰陽尤未盡其妙也故必使陰陽還為太極於是乎儘性即於是乎立命賢而近於聖宜若可以止矣噫詩不云乎上天之載無聲無臭太極無質而猶有形終非其究竟也明太極本無極又加一層功夫天地不能限鬼神不能知散之則無痕聚之亦無體萬古以來微孔子其誰與歸五行之生也各一其性太極生天地天地各有一太極天地生五行五行亦各有一太極五行之太極不惟彼此皆同並與先天之太極亦無不同太極即天命之性書曰惟皇降衷若有恆性曰恆者明天下蕃衍不齊之數其性無所不同也此云五行各具一性何歟曰五行亦有氣質之性試問五味入藥或溫或涼即各一其性之驗也非天命之性也無極之真二五之精妙合而凝上文言五行各性不專指人身言也就人身言之五臟亦五行而各有性亦各有無極但後天之無極非先天之無極耳先天之無極即圖中五行水火所綴之無極也何者為真即前所云一點靈光明而赤者也何謂二五二者六二居內卦之中女之少者也五者九五居外卦之中男之少者也卦以二五為偶是其定例此以喻夫婦合而妙妙而凝於時無極與精俱泄而生生化化遂無窮期地天之泰如是而已乾道成男坤道成女乾坤指父母男女指小孩夫無極之真乾先至而坤應之則成男坤先至而乾應之則成女乾坤各有無極即各有其真而先入者為主後來者不能爭也天地之產陰陽亦猶是耳二氣交感化生萬物萬物生生而變化無窮焉變化無窮至誠無息也惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣上文所言均是天道而注多就人言蓋天道難通就人身以指點較為親切庶令閱者洞知也此則專言人事也秀而最靈者何也蓋羽蟲秉南方火德介蟲秉北方水德鱗蟲秉東方木德毛蟲秉西方金德獨人為倮蟲之長秉中央土德左氏所謂受天地之中以生也惟其受中故兼日月五星之氣而無美不臻雖聖凡有別而其為靈則一也形者氣質也神者天命也五性兼天命氣質兩端故感動時有善惡也苟其行所無事如大舜由仁義行非行仁義匪惟無惡即善亦不留其跡安得有事而世人之善惡皆是有心即是多事惡故有罪善亦無功萬事之出就使每事留神而百孔千瘡終難彌補則逐末忘本揚湯止沸真不如釜底抽薪矣聖人定之以中正仁義而主靜立人極焉中正者太極也仁義者陰陽也以太極為體以陰陽為用明體達用之學內聖由之外王亦由之似可以無憾矣乃聖人不背自滿而必盡主靜之功也夫主靜二字朱子易為主敬後之尊朱子者遂爭言靜不如敬不知敬由勉強靜本自然靜也者浩浩其天無心成化並此主一無適之心渾而忘之聖不可知之謂神而向之中正仁義亦返虛入渾而不留其跡人之無極耶天之無極耶胡為乎而測故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶凡此者皆無心者也天地不自知其德日月不自知其明四時不自知其序鬼神不自知其吉凶順乎性之自然而毫無成見惟聖人拾其全理渾然泛然應之未嘗有心求合而兩閭之大不能出其範圍蓋其體既立其用自神初無顧茲失彼之憂也君子修之吉小人悖之凶不修不悖者聖人也修之悖之者君子小人也夫聖人初無吉凶之見由博返約洞燭本原不必勉其修而自無不修不必禁其悖而自無所悖所謂安行也若君子明知有吉而為理所範皇然修之其功雖有淺深均能造福小人明知有凶而為欲所歆毅然悖之其過雖分輕重均能招殃精神所至天地應之通塞壽夭胥判如此矣故曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義此易繫辭之說也陰陽剛柔仁義誰不知之所難者立其道焉耳立者立乎其先而怡然渙然不著於欲並不著於理而陰陽剛柔仁義莫非此怡然渙然者生生不窮而左宜右有謂其陰而又陽謂其剛而又柔謂其仁而又義溥博淵泉而時出之而所云天地人三道亦旁觀者分之而在己並無容心也斂之藏一心放之彌六合握中和之準定位育之功非具盛德其孰能與於斯又曰原始反終故知死生之說有始即有終有生即有死但死生可知而未生以前既死以後則不可知其說若何日觀乎復而一陽動即知生觀乎姤而一陰萌即知死不但此也生者死之本觀生時之作為而死可知死者生之機觀死時之情狀而生可知大抵人之初生各有天命氣即與命俱理即與氣俱以理攝氣而精完以氣壯理而神固生固生也死亦生也其在常人日沉酣於人欲之中而理久澌滅其氣雖不遽散而無以為之主斷不久長死固死也生亦死也間有能文之靈鬼享福之庸鬼銜冤之苦鬼耿耿一靈不肯消化亦但如電光石火疑有疑無且難至數百年況與天地同壽乎因思三教皆名為道而老氏符錄釋氏經咒儒氏詩文其非本旨灼然即數千年以前老氏深根固蒂守中抱一以命而全性也釋氏和合凝集決定成就以性而全命也孔子儘性以至命孟子養性以立命皆為性命雙修有利無害豈非死生之說了然於胸中哉大哉易也斯其至矣後跋東亭先生安徽休寧縣鳳湖人也生平心跡好積功累行毫不以功名富貴繫於懷馬茲於光緒丁亥歲遨遊漢皋來予旅邸謂家嚴曰方今明道之士遙遙海內未見一人何其道之煙湮沒以至如此家嚴答曰雖陰符道德傳世文辭古奧學者閱之而不解及後丹經疊出半隱半露學者參之而不透非道之不行實出道之不明也先生因茲大發慈悲著性命要旨一書書成之日見示於兆受而誦之純是先天之大道身心性命之學古來聖賢仙佛心心相印口口相傳秘訣莫不一一發之洵為宇宙間金科玉律天壤中寶字奇文也誠意修真之君子有緣得遇是書便可升堂入室遵法而行之層層透達節節見驗方知先生之道高矣先生之德厚矣而天下後世學人無不沾先生之恩矣時光緒丁亥年孟冬月富川愚侄柯兆平頓首敬跋
