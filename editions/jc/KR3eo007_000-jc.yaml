front:
  text: 首序試看世上之人不求於名即貪於利而不貪不求者蓋亦鮮矣惟修道之士體混元之本法天地之樞立為洪爐大鼎以煉其真毫無掛礙隨緣安止故不與世俗等類也予於是年作客漢皋適遇柯翁懷經汪翁東亭丰姿俊秀品格高超飄然有出塵之表復探其行止二翁常憩僻處促膝論道津津有味無日不然因謂曰二翁之學志在一身何不著書廣行天下教後世人人修其慧命同臻壽域以建功德之不朽二翁答曰子之所言者善也然道至公豈敢私於一己不費苦心切究不遭明師指點又焉能聞斯大道乎頃即遂出書二帙以示比閱之乃知養性編柯翁所作性命要旨汪翁所著退而讀之一文章華美學業功宏克繼黃老之道脈一辭旨淺顯義理精詳盡露鍾呂之玄機守勸以刊刻兩卷合成一部公諸海內以預學者採藥煉丹之捷徑超凡人聖之慈航也恐誤入傍門者得遇是書可能去傍而歸正有被偽師所惑者得遇是書亦可知偽而悟真闢其異端得入正道不負二翁壽世一片婆心爰不揣固陋妄作序以志之時光緒十五年荷月天貺日新安弟程守一拜序於云鶴山房自序蓋聞玄學自黃帝問道於廣成子以創其始老子著道德經以發其源亙古迄今成仙得道者莫不以黃帝老子為宗也予生性嗜慕玄學蒐羅丹經子書博覽經史道籍歷有年所無非頗明其理未得其訣是以浪跡江湖遍越名山覓訪明師十有二載一日由匡廬經過偶遇天秩吳翁睹其丰神灑脫必非常人也故請問玄旨答曰子雖有仙緣誠恐始勤而終怠予以弟子禮事之復詢其訣師乃大發鴻慈遂傳七返九還金液大丹之法火候次序之妙予已心領神會豁然貫通乃知大道原在己身所得決非向外求也嗣後至漢又遇柯懷經李云嵐周俊夫柯載書等四五道友同參切究頓悟全旨始知起手性命雙修之理生人生仙同出一源下手功夫明白玄關一陽初動神入氣穴化生機緘次地果還生腹中覺有一物活活潑潑如盤走珠次鉛汞交歸真土仍從竅內發出先天真鉛謂之藥產次藥物採歸爐里封固停息以伏神氣次氣滿督任子進陽火聚於乾頂卯沐浴以益其鉛午退陰符降歸坤宮酉沐浴以益其汞次周天行滿鉛氣飛盡煆成一塊乾水銀斯為丹矣次用七日採功神攢入鼎中大藥始萌次煉到火珠呈象採大藥出爐運行大周天穿過後三關降下重樓落入黃庭次靜養道胎養到十月胎圓氣足遷至上田次寄居泥丸百日冥目始見天花亂墜則出神之景至矣次調神出殼初出頂門俟金光如車輪之大即收歸於上田次一出一入漸漸純熟能通天達地遂以身化身愈化愈多不可勝數古人謂之千百億化是也次萬殊復歸一本煉神還虛功行圓滿永作帝鄉之客俾學者閱其綱領庶不致前後之混雜也因不揣譾劣勉成書一卷名曰性命要旨彰明玄學大開道門亦不敢以為己作引諸仙口訣概而證之願天下人人修此大道超升上界同享天福是予之厚望也夫時光緒十三年仲秋月中浣海陽汪東亭序於北學草堂之玩月軒太極圖說註解序太極之理微矣哉妙矣哉至無而含至有至虛而含至實無形無象先天而立其體後天而發其用不可以知知不可以識識擬之則失議之則非古人強圖之以強名之曰道曰虛無曰先天一氣曰無極曰太極曰道者無名之名也曰虛無無極者自未生物時言之曰太極一氣者自方生物時言之其實虛無一氣無極太極總是道之一個物事非有二件在河圖洛書即中五之中一點在先天后天即陰陽相交之中一竅惜乎為氣稟所拘人慾所蔽順其後天之陰氣迷失虛靈不昧之本宗流蕩忘返深可慨也僕慕道久矣乙未冬托足漢皋適聞汪東亭先生抱道在躬緣執弟子禮叩以先天后天之奧旨蒙垂慈答曰伏羲氏之河圖而虛其中者先天也老子曰無名天地之始性也即此物也儒有黃中之中釋有空中之中道有環中之中是指天地交成一點靈光也神禹氏之洛書而實其中者後天也老子曰有名萬物之母命也即此物也儒有精一之一釋有歸一之一道有得一之一是指父母交成一點真氣也此先天性命自然配合欲求雙修亦復如是儒曰一貫者貫此一於中也釋曰歸一者歸此一於中也道曰抱一者抱此一於中也有中必有一有一必有中中包乎一一主乎中即是性不離命命不離性性命混化成此一物人人具足個個圓成處聖不增處凡不減雖蚊虻蚤蝨之微物莫不相同邵子云一物一太極物物各一太極是也第一齣母胎一物即分為二及至破體二又分為三矣於是先天蔽藏後天坎水下漏離火上炎水火不濟漸至老死都為尋不著來時舊路耳權以造端夫婦之道合仙凡論之凡道外托媒人說一女子臨期送入洞房男子一見後天心腎合一外陽勃舉立成此一物也卻將此物投入女子此一物之中片刻婦人懷孕此以女嫁男順行之事也仙道內明本身奼女亦有此一物也時至嬰兒出現先天心腎合一外陽即舉亦成此一物也隨請黃婆送入麗春院內將此物中一線真氣投入奼女此物之內男兒亦片刻懷胎此以男下女逆修之事也究之仙凡雖分兩途理路實無二致只爭順逆之分耳不觀夫元要篇之詩乎卻將奼女當時待勾引郎君自外來他如會心集云九三男子來投宿二八佳人去安床黃婆說合為匹配夫妻相愛似鴛鴦顛鸞倒鳳神氣合如醉如癡鬧一場忽然一點滴元竅固濟牢封莫商量從此聖胎已有象太乙真精在內藏指元集云自家精血自交媾身里夫妻是妙哉大成集云自家身里有夫妻說與世人真笑殺總之千聖一貫心傳必須分清身內兩重天地四固陰陽之消息方有下手處也汪師如此云云令人頓開茅塞復出周子太極圖說註解示之再四講求始知系汪先生草創之柯懷經先生討論之古吳孫吉甫孝廉更將文理修飾之裡面遂成全璧讀之益覺豁然從此勤而行之信乎杏林真人之言吾自得師訣以來知此身必不死知此丹必可成僕非阿所好而誇大其言也亦非有所貪而虛張其勢也憶自丁丑病後灰心銖視軒冕塵視金玉垂二十年矣此外尚可求哉不過念同志者未逢師指此事難知特請付諸手民以為學道之圭旨焉是為序光緒丙申年春王正月豫章趙抱真慕韓氏拜書於西昌別墅
